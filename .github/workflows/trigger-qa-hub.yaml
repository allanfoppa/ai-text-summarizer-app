name: Trigger QA Hub (AI Text Summarizer)

on:
  push:
    branches: [main]

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]

    steps:
      - name: Dispatch Event to QA Hub
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
        run: |
          set -euo pipefail

          PROJECT="${{ matrix.project }}"

          if [ "$PROJECT" = "frontend" ]; then
            PORT=4173
          else
            PORT=4000
          fi

          EVENT_TYPE="run-ai-text-summarizer-app-${PROJECT}-tests"
          REPO="${{ github.repository_owner }}/${{ github.event.repository.name }}"
          echo "Repository name: $REPO"

          echo "🚀 Dispatching $EVENT_TYPE"

          curl -i -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/allanfoppa/ai-qa-testing-hub/dispatches \
            -d "{
              \"event_type\": \"$EVENT_TYPE\",
              \"client_payload\": {
                \"qaContract\": \"v1\",
                \"repo\": \"$REPO\",
                \"app\": {
                  \"root\": \"${PROJECT}\"
                },
                \"server\": {
                  \"port\": $PORT,
                  \"healthcheck\": \"http://localhost:$PORT\"
                }
              }
            }"
