name: Trigger QA Hub (AI Text Summarizer)

on:
  push:
    branches: [main]

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]

    steps:
      - name: Dispatch Event to QA Hub
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
        run: |
          curl -L -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/allanfoppa/ai-qa-testing-hub/dispatches \
          -d '{
            "event_type": "run-ai-text-summarizer-app-${{ matrix.project }}-tests",
            "client_payload": {
              "qaContract": "v1",
              "repo": "${{ github.repository }}",
              "workspace_name": "@hub/ai-text-summarizer-app-${{ matrix.project }}"
              "app": {
                "name": "ai-text-${{ matrix.project }}",
                "root": "${{ matrix.project }}"
              },
              "runtime": {
                "package_manager": "pnpm"
              },
              "commands": {
                "install": "pnpm install",
                "build": "pnpm run build",
                "start": "${{ matrix.project == 'frontend' && 'pnpm exec vite preview --port 4173' || 'pnpm run start:dev' }}"
              },
              "server": {
                "port": ${{ matrix.project == 'frontend' && 4173 || 4000 }},
                "healthcheck": "http://localhost:${{ matrix.project == 'frontend' && 4173 || 4000 }}"
              },
              "timeouts": {
                "startup": 60
              }
            }
          }'
